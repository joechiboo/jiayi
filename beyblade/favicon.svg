    <!-- 輻條 -->
    <g stroke="#ffffff" stroke-width="2.8" stroke-linecap="round" opacity=".8">
      <line x1="32" y1="32" x2="32" y2="14"/>
      <line x1="32" y1="32" x2="47.6" y2="41"/>
